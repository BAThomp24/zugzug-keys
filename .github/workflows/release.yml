name: Release

# Mirrors zugzug-addon's release pipeline: builds a ZugZugKeys.zip and
# creates (or updates) a date-tagged GitHub Release so CurseForge's
# auto-sync has something to pull. CurseForge polls GitHub Releases via
# the linked project (X-Curse-Project-ID: zugzug-keys in the TOC), so
# there's no CF API token required here — just publish the release.

on:
  push:
    branches: [main]
    # Skip release runs for purely-docs / meta changes — they don't
    # change the addon's runtime behaviour, so no need to ship.
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - ".github/**"
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases + push tags

    steps:
      - uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        # Include HHMM so every release is a UNIQUE tag. CurseForge only
        # re-syncs on a *new* release tag — updating the asset on an
        # existing tag is silently ignored — so a date-only tag meant a
        # second push the same day never reached CurseForge.
        run: echo "tag=v$(date -u +%Y.%m.%d.%H%M)" >> "$GITHUB_OUTPUT"

      - name: Build ZugZugKeys.zip
        # Substitute the @project-version@ token with the real tag so the
        # in-game Version field shows a meaningful value (our custom
        # pipeline doesn't run the CurseForge packager that normally does
        # this). The checkout is disposable, so editing in place is fine.
        # Then bundle the TOC + every .lua module; anything in .pkgmeta's
        # ignore section is excluded by listing files explicitly.
        run: |
          sed -i "s/@project-version@/${{ steps.version.outputs.tag }}/" ZugZugKeys.toc
          zip -r ZugZugKeys.zip \
            ZugZugKeys.toc \
            Core.lua \
            Status.lua \
            KeyInfo.lua \
            FriendsList.lua \
            LustData.lua \
            LustReminder.lua \
            Settings.lua

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZugZug Keys ${{ steps.version.outputs.tag }}
          body: |
            Mythic+ tools and tweaks — companion addon to [ZugZug](https://zugzug.info).

            Download `ZugZugKeys.zip` and extract into your
            `Interface/AddOns/` folder, or install via CurseForge/WoWUp.
          files: ZugZugKeys.zip
